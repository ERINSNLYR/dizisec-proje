<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>DİZİSEÇ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="openMenuBtn" class="openbtn" onclick="toggleNav()" style="z-index: 9999; position: fixed;">☰</button>
<div id="mySidebar" class="sidebar">
  <div class="sidebar-header">
    <h2 style="color: #ff4757;">MENÜ</h2>
    <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">×</a>
  </div>
  
  <div class="sidebar-content">
    <button class="active" onclick="filterByCategory('ALL', this); toggleNav()">🏠 Tümü</button>
    <button onclick="filterByCategory('Sci-Fi', this); toggleNav()">🚀 Sci-Fi</button>
    <button onclick="filterByCategory('Drama', this); toggleNav()">🎭 Drama</button>
    <button onclick="filterByCategory('Thriller', this); toggleNav()">🔪 Thriller</button>
    <button onclick="filterByCategory('Crime', this); toggleNav()">🕵️ Crime</button>
    <button onclick="filterByCategory('Mystery', this); toggleNav()">🔎 Mystery</button>
    <hr style="border: 0.1px solid rgba(255,255,255,0.1); margin: 15px 0;">
    <button class="fav-category-btn" onclick="showFavorites(this); toggleNav()">⭐ Favorilerim</button>
    <button onclick="cikisYap()" style="color: #ff4757; margin-top: 20px;">🚪 Çıkış Yap</button>
  </div>
</div>

<button id="openMenuBtn" class="openbtn" onclick="toggleNav()">☰</button>
 <div id="loginScreen" class="soft-polis-bg" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; z-index: 10;">
    <div style="background: rgba(0, 0, 0, 0.7); padding: 40px; border-radius: 10px; text-align: center; width: 350px; box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); border: 1px solid rgba(255,255,255,0.1);">
      <h1 style="color: #ff4757; margin-bottom: 25px; font-size: 32px; font-weight: bold; letter-spacing: 2px;">DİZİSEÇ</h1>
      <input type="text" id="usernameInput" placeholder="Kullanıcı Adı" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; background: #333; color: white; outline: none;">
      <input type="password" id="passwordInput" placeholder="Şifre" style="width: 100%; padding: 12px; margin-bottom: 25px; border-radius: 5px; border: none; background: #333; color: white; outline: none;">
      <button onclick="girisYap()" style="background: #ff4757; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 16px; transition: 0.3s;">Giriş Yap</button>
      <button onclick="kayitOl()" style="background: transparent; color: #ff4757; padding: 10px; width: 100%; border: 1px solid #ff4757; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;">Yeni Kayıt Ol</button>
    </div>
  </div>

  <div id="mainApp" class="container" style="display: none;">   
    <p class="subtitle">Sevdiğin film veya diziyi yaz, benzerlerini önerelim</p>

    <div class="categories">
      <button class="active" onclick="filterByCategory('ALL', this)">Tümü</button>
      <button onclick="filterByCategory('Sci-Fi', this)">Sci-Fi</button>
      <button onclick="filterByCategory('Drama', this)">Drama</button>
      <button onclick="filterByCategory('Thriller', this)">Thriller</button>
      <button onclick="filterByCategory('Crime', this)">Crime</button>
      <button onclick="filterByCategory('Mystery', this)">Mystery</button>
      
      
      
    </div>

    <div class="search-box">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Örn: Inception"
        oninput="canliArama()">
      <button onclick="searchTMDB()">Öner</button>
    </div>

    <div id="results" class="results"></div>
    <button id="loadMoreBtn" onclick="dahaFazlaYukle()" style="display: none; margin: 30px auto; padding: 12px 25px; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s;">Daha Fazla Yükle</button>
    
  </div>

  <div id="popup" class="popup">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">×</span>
      <h2 id="popupTitle"></h2>
      <p id="popupInfo"></p>
    </div>
  </div>

  <script src="script.js"></script> 
</body>

</html>
